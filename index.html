/* Import from a public Google Sheets link by pulling its CSV export.
   Only works for sheets shared as "Anyone with the link can view" — Google
   serves the CSV export of public sheets with open CORS, but private sheets
   will fail here since there's no OAuth flow in a static page. */
function importFromGoogleSheetLink(url, callback){
  const idMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(!idMatch){ callback(null, "That doesn't look like a Google Sheets link."); return; }
  const sheetId = idMatch[1];
  const gidMatch = url.match(/[?#&]gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : '0';
  const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
  // Google's export endpoint doesn't send CORS headers, so a direct
  // cross-origin fetch from this page is blocked by the browser even when
  // the sheet is shared as "Anyone with the link can view" — that setting
  // only controls whether Google serves the file, not whether it lets other
  // websites read the response. Fall back to a public CORS relay so the
  // browser will allow the read.
  const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`;

  function handleText(text){
    const parsed = Papa.parse(text, {skipEmptyLines:true});
    let rows = (parsed.data||[]).filter(r=>r && r.length && r.join('').trim());
    if(!rows.length){ callback(null, 'No usable rows found in that sheet.'); return; }
    callback(isWideFormat(rows) ? mapWideFormatRows(rows) : mapRawRows(rows));
  }

  fetch(csvUrl)
    .then(res=>{
      if(!res.ok) throw new Error('status ' + res.status);
      const ct = res.headers.get('content-type')||'';
      if(ct.includes('text/html')) throw new Error('not shared');
      return res.text();
    })
    .then(handleText)
    .catch(()=>{
      // Direct fetch failed (almost always CORS) — retry through the proxy
      // before giving up.
      fetch(proxyUrl)
        .then(res=>{ if(!res.ok) throw new Error('status ' + res.status); return res.text(); })
        .then(text=>{
          if(/<html[\s>]/i.test(text.slice(0,200))) throw new Error('not shared');
          handleText(text);
        })
        .catch(err=>{
          console.warn('gsheet import failed', err);
          callback(null, "Couldn't fetch that sheet even via a CORS relay — make sure it's shared as \"Anyone with the link can view\" (not just to specific people), then try again.");
        });
    });
}

/* Read a real spreadsheet file (.xlsx/.xls/.csv/.tsv), analyze every sheet,
   and hand back rows in the same shape smartParse produces from pasted text. */
/* Normalize text for fuzzy matching: lowercase, collapse punctuation/whitespace. */
function normalizeForMatch(s){
  return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
/* Find an existing unit whose name matches (exactly, or as a substring in
   either direction) the given text — used both when scanning row cells and
   when falling back to a sheet/file name hint. */
function findUnitMatch(text){
  const norm = normalizeForMatch(text);
  if(!norm) return null;
  let found = db.units.find(u=> normalizeForMatch(u.name)===norm);
  if(found) return found;
  found = db.units.find(u=>{
    const un = normalizeForMatch(u.name);
    return un && (norm.includes(un) || un.includes(norm));
  });
  return found || null;
}
/* Same idea for buildings, used to place a brand-new unit under the right
   building when a sheet/file/column names the building rather than the unit. */
function findBuildingMatch(text){
  const norm = normalizeForMatch(text);
  if(!norm) return null;
  let found = db.buildings.find(b=> normalizeForMatch(b.name)===norm);
  if(found) return found;
  found = db.buildings.find(b=>{
    const bn = normalizeForMatch(b.name);
    return bn && (norm.includes(bn) || bn.includes(norm));
  });
  return found || null;
}
/* Parse a money-looking string into a signed number, handling currency
   symbols, thousands separators, and both accounting-negative styles:
   parentheses "(1,200.00)" and a trailing minus "1200-". */
function parseMoneyString(s){
  if(s==null) return NaN;
  s = String(s).trim();
  if(!s) return NaN;
  let neg = false;
  if(/^\(.*\)$/.test(s)){ neg = true; s = s.slice(1,-1); }
  if(/-\s*$/.test(s)){ neg = true; s = s.replace(/-\s*$/,''); }
  s = s.replace(/[₱$,\s]/g,'');
  if(/^-/.test(s)){ neg = true; s = s.replace(/^-/,''); }
  const n = parseFloat(s);
  if(isNaN(n)) return NaN;
  return neg ? -n : n;
}

/* Parse a date-looking string using a series of increasingly permissive
   strategies, returning YYYY-MM-DD or null if nothing usable was found.
   Order: ISO (YYYY-M-D) -> US slash (M/D/YYYY) -> spreadsheet serial number
   -> a generic Date.parse() fallback that also understands month names
   ("May 5, 2026", "5 May 2026", "2026-05-05T10:00:00Z", etc). This keeps the
   ledger faithful to whatever date was actually written in the source file
   instead of silently substituting today's date whenever the format is
   slightly different than expected. */
function parseFlexibleDate(raw){
  if(raw==null) return null;
  const date = String(raw).trim();
  if(!date) return null;

  const iso = date.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso){ const [,y,m,d]=iso; return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

  const us = date.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(us){ let [,mm,dd,yy]=us; if(yy.length===2) yy='20'+yy; return `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`; }

  const serial = parseFloat(date);
  if(!isNaN(serial) && /^-?\d+(\.\d+)?$/.test(date) && serial>20000 && serial<80000){
    const d = new Date(Math.round((serial-25569)*86400*1000));
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }

  // Generic fallback: handles month-name formats ("May 5, 2026", "5 May 2026",
  // "2026/05/05", full ISO timestamps, etc.
  if(/[a-zA-Z]/.test(date) || /\d{4}/.test(date)){
    const parsed = new Date(date);
    if(!isNaN(parsed.getTime())){
      return `${parsed.getFullYear()}-${String(parsed.getMonth()+1).padStart(2,'0')}-${String(parsed.getDate()).padStart(2,'0')}`;
    }
  }
  return null;
}

/* ---- Wide / pivot-table support -----------------------------------------
   The built-in mapRawRows() above only understands "long" transactional
   data: one row = one record (date, unit, amount, category...). It has no
   concept of a pivot layout — which is exactly the shape of the ledger's own
   real source data (see the IMPORTED_LEDGER_DATA comment above: "wide
   monthly-summary layout, one column per unit, one row per month"). Feeding
   that shape through the long-format parser causes two compounding bugs:
   (1) only the first numeric cell in each row gets read as "amount" and
   every other unit's value on that row is silently discarded, and (2) since
   none of the data cells contain a unit name, the row falls back to using
   the sheet/tab name (e.g. "Income" or "Expenses") as if it *were* a unit —
   dumping every row's (partial, wrong) data onto one bogus fabricated unit.
   That fabricated-unit bug is fixed separately in mapRawRows() above; this
   block adds the missing capability itself: detect a pivot layout and
   correctly split each row into one entry per unit column. ---------------- */

/* A table "looks wide" when most data rows carry several numeric values
   across their columns (one per unit) rather than the single "amount"
   column a transactional row would have. */
function isWideFormat(rows){
  if(!rows || rows.length<2) return false;
  const header = rows[0];
  if(!header || header.length<4) return false; // need a label column + at least 3 unit columns
  const dataRows = rows.slice(1).filter(r=>r && r.length && r.join('').trim());
  if(!dataRows.length) return false;
  // A date like "2026-05-05" is itself parsed as the number 2026 by
  // parseFloat/parseMoneyString, so it must be excluded here or an ordinary
  // transactional row (unit, date, amount, category, note) gets miscounted
  // as having 2 numeric columns and wrongly flagged as a pivot table.
  const dateLikeRe = /(\d{4}-\d{1,2}-\d{1,2})|(\d{1,2}\/\d{1,2}\/\d{2,4})/;
  const rowsWithMultipleNumeric = dataRows.filter(r=>{
    let numeric=0;
    for(let i=1;i<r.length;i++){
      const v = r[i];
      if(v==null || String(v).trim()==='') continue;
      const s = String(v).trim();
      if(dateLikeRe.test(s)) continue;
      if(!isNaN(parseMoneyString(s))) numeric++;
      if(numeric>=3) break;
    }
    return numeric>=3;
  }).length;
  return rowsWithMultipleNumeric/dataRows.length >= 0.5;
}

/* Pivot a wide table (header row = unit names, each subsequent row = one
   month) into the same flat row shape mapRawRows() produces, so it can feed
   the same preview/confirm UI. Each nonzero cell becomes its own entry. */
function mapWideFormatRows(rows, hint){
  hint = hint || {};
  const header = rows[0].map(x=>String(x??'').trim());
  const dataRows = rows.slice(1).filter(r=>r && r.length && r.join('').trim());

  // The sheet/tab/file name (e.g. "Income" or "Expenses") tells us the kind
  // for every entry pulled from this table.
  let sheetKind = null;
  if(hint.nameHint){
    if(/income|revenue|payout|booking|gross/i.test(hint.nameHint)) sheetKind = 'income';
    else if(/expense|cost|expenditure|cogs/i.test(hint.nameHint)) sheetKind = 'expense-variable';
  }

  const unitCols = [];
  for(let i=1;i<header.length;i++){ if(header[i] && header[i].trim()) unitCols.push(i); }

  const out = [];
  dataRows.forEach(r=>{
    const label = r[0];
    let rowDate = parseFlexibleDate(label);
    if(!rowDate){
      // handle a bare month name with no year in the same cell, e.g. "January"
      const lc = String(label||'').trim().toLowerCase();
      let mi = MONTHS_FULL.findIndex(m=>m.toLowerCase()===lc);
      if(mi<0) mi = MONTHS.findIndex(m=>m.toLowerCase()===lc);
      if(mi>=0){
        let year = null;
        [...r, ...header, hint.nameHint].forEach(c=>{
          if(year) return;
          const m4 = String(c??'').match(/\b(20\d{2})\b/);
          if(m4) year = m4[1];
        });
        if(!year) year = String(new Date().getFullYear());
        rowDate = `${year}-${String(mi+1).padStart(2,'0')}-05`;
      }
    }
    if(!rowDate) return; // no usable date signal anywhere on this row — skip rather than guess

    unitCols.forEach(ci=>{
      const raw = r[ci];
      if(raw==null || String(raw).trim()==='') return;
      const amt = parseMoneyString(raw);
      if(isNaN(amt) || amt===0) return;
      const unitHeader = header[ci];
      const matched = findUnitMatch(unitHeader);
      out.push({
        date: rowDate,
        amount: Math.abs(amt),
        unitText: matched ? matched.name : unitHeader,
        buildingText: '',
        unitId: matched ? matched.id : null,
        isNewUnit: !matched,
        noUnitDetected: false,
        category: 'Imported',
        note: 'Imported (monthly summary)',
        kind: sheetKind || 'income',
        raw: `${label} — ${unitHeader}: ${raw}`
      });
    });
  });
  return out;
}

function parseSpreadsheetFile(file, callback){
  const ext = (file.name.split('.').pop()||'').toLowerCase();
  const baseName = file.name.replace(/\.[^.]+$/,'');
  const reader = new FileReader();
  reader.onerror = ()=> callback(null, 'Could not read that file');
  reader.onload = (e)=>{
    try{
      let parsedRows = [];
      if(ext==='csv' || ext==='tsv' || ext==='txt'){
        const parsed = Papa.parse(e.target.result, {skipEmptyLines:true, delimiter: ext==='tsv' ? '\t' : undefined});
        const cleanRows = (parsed.data||[]).filter(r=>r && r.length && r.join('').trim());
        // The file's own name is a useful hint if a row's unit isn't otherwise identifiable
        // (e.g. someone exports one CSV per unit, named "Villa A.csv").
        parsedRows = isWideFormat(cleanRows)
          ? mapWideFormatRows(cleanRows, {nameHint: baseName})
          : mapRawRows(cleanRows, {nameHint: baseName});
      } else {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        // Analyze every tab in the workbook separately — each sheet gets its own
        // header-row detection, and the tab's name is used as a hint (e.g. a
        // "Unit 101" tab routes its rows to that unit) so nothing from any
        // sheet gets silently dropped or misfiled into the wrong entry. Each
        // sheet is also checked independently for a wide/pivot layout (one
        // row per month, one column per unit) since a workbook commonly mixes
        // a wide "Income" tab, a wide "Expenses" tab, and ordinary tabs.
        wb.SheetNames.forEach(sheetName=>{
          const sheet = wb.Sheets[sheetName];
          const json = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:''});
          const cleanRows = json.filter(r=>r && r.length && r.join('').trim());
          if(!cleanRows.length) return;
          parsedRows = parsedRows.concat(
            isWideFormat(cleanRows)
              ? mapWideFormatRows(cleanRows, {nameHint: sheetName})
              : mapRawRows(cleanRows, {nameHint: sheetName})
          );
        });
      }
      if(!parsedRows.length){ callback(null, 'No usable rows found in that file'); return; }
      callback(parsedRows);
    }catch(err){
      console.warn('spreadsheet parse failed', err);
      callback(null, 'Could not parse that file — try exporting it as .xlsx or .csv');
    }
  };
  if(ext==='csv' || ext==='tsv' || ext==='txt') reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function smartParse(raw){
  raw = raw.trim();
  // detect delimiter: tab > comma > multiple-spaces
  let delim = '\t';
  if(!raw.includes('\t')){
    const commaLines = raw.split('\n').filter(l=>l.includes(','));
    delim = commaLines.length > raw.split('\n').length/2 ? ',' : null;
  }
  let rows;
  if(delim){
    const parsed = Papa.parse(raw, {delimiter: delim, skipEmptyLines:true});
    rows = parsed.data;
  } else {
    rows = raw.split('\n').filter(l=>l.trim()).map(l=>l.trim().split(/\s{2,}|\s*\|\s*|,\s*/).filter(Boolean));
  }
  rows = rows.filter(r=>r.length && r.join('').trim());
  return isWideFormat(rows) ? mapWideFormatRows(rows) : mapRawRows(rows);
}

/* Shared analysis step: takes a plain array-of-arrays (from pasted text,
   a .csv/.tsv, or one sheet of an .xlsx/.xls workbook) and heuristically
   maps each row onto Income or Expenses, matching it to an existing unit
   where possible. Rows whose unit can't be matched are flagged with
   isNewUnit so the preview / confirm step can add them as new entries
   instead of silently dropping them or dumping them onto an unrelated unit.
   `hint.nameHint`, when given (a sheet tab name or a file's own name), is
   used as a last-resort unit/building signal for rows that don't otherwise
   name one — e.g. a workbook tab called "Villa A" routes its rows there.
   Rows where absolutely no unit signal exists anywhere (no matched unit, no
   usable unit text, no usable hint) are flagged noUnitDetected so the
   preview forces an explicit manual choice instead of ever silently
   defaulting to some arbitrary unit. */
function mapRawRows(rows, hint){
  hint = hint || {};
  const genericNameRe = /^(sheet\d*|summary|totals?|overview|dashboard|data|import|export|report)$/i;
  // A tab/file literally named "Income" or "Expenses" describes the *table*,
  // not a unit — it must never be used as a fallback unit name (that bug
  // caused an entire wide sheet to get dumped onto one bogus unit named
  // "Income"). Use it only to guess the default kind for rows in that sheet.
  const kindHintRe = /income|revenue|payout|booking|gross|expense|cost|expenditure|cogs/i;
  const hintIsUsable = hint.nameHint && !genericNameRe.test(hint.nameHint.trim()) && !kindHintRe.test(hint.nameHint.trim());
  let sheetKindHint = null;
  if(hint.nameHint){
    if(/income|revenue|payout|booking|gross/i.test(hint.nameHint)) sheetKindHint = 'income';
    else if(/expense|cost|expenditure|cogs/i.test(hint.nameHint)) sheetKindHint = 'expense-variable';
  }
  if(!rows.length) return [];
  // detect header row — require several short, label-like cells to match, and
  // never treat the only row as a header (that would leave zero data rows,
  // e.g. a single row like "2026-06-03, 30000, airbnb payout income" must
  // not be mistaken for a header just because "income" appears in a note).
  //
  // A real header row never contains anything that looks like an actual
  // date or money amount — real data rows do. Without this guard, a first
  // data row like "Unit 101, 2026-05-05, 28000, income, Airbnb payout" was
  // being misread as a header (because "Unit 101" starts with "unit" and
  // "income" matches exactly) and silently deleted from the import.
  const dateRe = /(\d{4}-\d{1,2}-\d{1,2})|(\d{1,2}\/\d{1,2}\/\d{2,4})/;
  const moneyRe = /^\(?-?[₱$]?\s?[\d,]+(\.\d+)?\)?-?$/;
  const headerKeywords = ['date','unit','amount','category','type','note','description','income','expense','property','building'];
  let headerIdx = -1;
  const firstRow = rows[0].map(x=>String(x).trim().toLowerCase());
  const firstRowLooksLikeData = firstRow.some(cell=> dateRe.test(cell) || moneyRe.test(cell.replace(/\s/g,'')));
  if(rows.length>1 && !firstRowLooksLikeData){
    const keywordHits = firstRow.filter(cell=> cell.length>0 && cell.length<=20 &&
      headerKeywords.some(k=> cell===k || cell.startsWith(k) || cell.endsWith(k))).length;
    if(keywordHits>=2) headerIdx = 0;
  }

  let colMap = {};
  let dataRows = rows;
  if(headerIdx===0){
    dataRows = rows.slice(1);
    firstRow.forEach((h,i)=>{
      if(/date/.test(h)) colMap.date=i;
      else if(/amount|amt|total|price|cost/.test(h)) colMap.amount=i;
      else if(/unit|room|property/.test(h)) colMap.unit=i;
      else if(/building/.test(h)) colMap.building=i;
      else if(/category|cat/.test(h)) colMap.category=i;
      else if(/type/.test(h)) colMap.type=i;
      else if(/note|desc|memo|source/.test(h)) colMap.note=i;
    });
  }

  const parsedRows = dataRows.map(cells=>{
    cells = cells.map(x=>String(x??'').trim());
    let date = colMap.date!==undefined ? cells[colMap.date] : null;
    let amount = colMap.amount!==undefined ? cells[colMap.amount] : null;
    let unitText = colMap.unit!==undefined ? cells[colMap.unit] : null;
    let buildingText = colMap.building!==undefined ? cells[colMap.building] : null;
    let category = colMap.category!==undefined ? cells[colMap.category] : null;
    let typeText = colMap.type!==undefined ? cells[colMap.type] : null;
    let note = colMap.note!==undefined ? cells[colMap.note] : null;

    // Match against a known unit's name *before* scanning for a fallback
    // amount. Many real unit names are themselves plain numbers (e.g.
    // "3715"), and without this ordering that numeric unit code — if it
    // appears earlier in the row than the real amount — was being read as
    // the amount instead, silently importing the wrong figure.
    let matchedExistingUnit = false;
    let matchedUnitCellIdx = -1;
    if(!unitText){
      for(let ci=0; ci<cells.length; ci++){
        const m = findUnitMatch(cells[ci]);
        if(m){ unitText = m.name; matchedExistingUnit = true; matchedUnitCellIdx = ci; break; }
      }
    } else {
      matchedUnitCellIdx = cells.indexOf(unitText);
    }

    // fallback: scan remaining cells (skipping whichever one was just
    // identified as the unit) for whatever wasn't mapped
    cells.forEach((cell,ci)=>{
      if(ci===matchedUnitCellIdx) return;
      if(!date && dateRe.test(cell)) date = cell;
      else if(!amount && moneyRe.test(cell.replace(/\s/g,''))) amount = cell;
    });
    // fall back to the sheet tab / file name as a unit signal (e.g. a "Villa A" tab)
    let unitTextFromHintOnly = false;
    if(!unitText && hintIsUsable){
      const m = findUnitMatch(hint.nameHint);
      if(m){ unitText = m.name; matchedExistingUnit = true; }
      else { unitText = hint.nameHint.trim(); unitTextFromHintOnly = true; }
    }
    if(!buildingText && hintIsUsable){
      const bm = findBuildingMatch(hint.nameHint);
      if(bm) buildingText = bm.name;
    }
    if(!category && !colMap.category){
      const nonDateAmount = cells.filter(c=>c!==date && c!==amount);
      category = nonDateAmount.find(c=>isNaN(parseFloat(c))) || 'Imported';
    }

    // A row has zero real unit signal if nothing at all was found — not even
    // a generic hint like a filename. Force this to be resolved manually.
    const noUnitDetected = !unitText || !unitText.trim();

    // normalize date — always respect the date actually present in the
    // source data; only fall back to today when literally nothing parseable
    // was found in any cell.
    let normDate = date ? parseFlexibleDate(date) : null;
    if(!normDate){
      for(const cell of cells){ const p = parseFlexibleDate(cell); if(p){ normDate = p; break; } }
    }
    if(!normDate) normDate = todayISO();

    // parse amount, keeping the original sign (accounting-style negatives use
    // parentheses or a trailing minus) before storing it as a positive
    // magnitude — the ledger always stores positive amounts and relies on
    // the income/expense split for sign, so a negative-formatted expense
    // must not be silently discarded.
    const rawAmount = amount!=null ? parseMoneyString(amount) : NaN;
    const normAmount = isNaN(rawAmount) ? NaN : Math.abs(rawAmount);

    // detect type
    let kind = 'expense-variable';
    const allText = (typeText||'')+' '+(category||'')+' '+(note||'')+' '+cells.join(' ');
    if(/income|payout|booking|revenue|gross/i.test(allText)) kind='income';
    else if(/constant|fixed|utilit|dues|insurance|rent|amortization|subscription/i.test(allText)) kind='expense-constant';
    else if(/variable|clean|repair|suppl|marketing|maintenance/i.test(allText)) kind='expense-variable';
    else if(sheetKindHint) kind = sheetKindHint;

    // resolve unit id against existing units ("relevant tabs")
    let unitId = null;
    if(unitText){
      const found = findUnitMatch(unitText);
      if(found){ unitId = found.id; matchedExistingUnit = true; }
    }
    // no existing unit matched this row -> it'll be added as a brand new unit/entry on confirm,
    // unless the only signal we had was a generic hint with no real match (noUnitDetected below wins).
    const isNewUnit = !!unitText && !matchedExistingUnit && !noUnitDetected;

    return { date:normDate, amount:isNaN(normAmount)?0:normAmount, unitText:unitText||'', buildingText:buildingText||'', unitId, isNewUnit, noUnitDetected, category:category||note||'Imported', note:note||category||'Imported', kind, raw:cells.join(' | ') };
  }).filter(r=>r.amount>0);

  return parsedRows;
}

/* Flags each row as a likely duplicate of either (a) an entry already in the
   ledger with the same unit, date and amount, or (b) another row already
   seen earlier in this same import batch. Flagged rows default to excluded
   (unchecked) so a re-import of the same file doesn't silently double an
   entry, but the person can still tick "Import" to include one on purpose —
   e.g. two genuinely separate ₱1,500 cleaning fees on the same day. Rows
   with no unit detected at all also default to excluded until a unit is
   manually chosen, so nothing is ever imported against the wrong unit. */
function annotateDuplicates(rows){
  const seenInBatch = new Map();
  rows.forEach(r=>{
    let reason = null;
    if(!r.isNewUnit && r.unitId){
      const list = r.kind==='income' ? db.income : db.expenses;
      const match = list.find(x=> x.unitId===r.unitId && x.date===r.date && Math.abs((parseFloat(x.amount)||0)-r.amount)<0.01);
      if(match) reason = 'Matches an entry already in the ledger — same unit, date and amount';
    }
    if(!reason){
      const key = [r.unitId || ('new:'+r.unitText.toLowerCase()), r.date, r.amount.toFixed(2), r.kind].join('|');
      if(seenInBatch.has(key)) reason = 'Duplicate of another row in this import batch';
      else seenInBatch.set(key, true);
    }
    r.dupWarning = reason;
    if(r.__include===undefined) r.__include = !reason && !r.noUnitDetected;
  });
}

function renderImportPreview(rows){
  const wrap = document.getElementById('import-preview-wrap');
  if(!rows.length){ wrap.innerHTML = `<div class="empty-state">Could not detect any usable rows. Try including a header row (date, unit, amount, category).</div>`; return; }

  function draw(){
    annotateDuplicates(rows);
    const newCount = rows.filter(r=>r.isNewUnit).length;
    const dupCount = rows.filter(r=>r.dupWarning).length;
    const noUnitCount = rows.filter(r=>r.noUnitDetected).length;
    const allChecked = rows.length>0 && rows.every(r=>r.__include);
    wrap.innerHTML = `
      <p class="hint">Detected <strong>${rows.length}</strong> row(s)${newCount?`, including <strong>${newCount}</strong> for a unit not yet in the ledger — these will be added as new entries`:''}. Review the target and unit for each, then confirm.<span class="badge-count">${rows.length}</span></p>
      ${dupCount?`<p class="hint" style="color:#8a5f0e;font-weight:700;">⚠ ${dupCount} row(s) look like duplicates and are unchecked below — review the "Import" column and tick any you actually want included.</p>`:''}
      ${noUnitCount?`<p class="hint" style="color:#a3271b;font-weight:700;">⚠ ${noUnitCount} row(s) have no unit detected — choose a unit for each in the "Unit" column before they can be included.</p>`:''}
      <div class="table-wrap"><table class="import-preview-table">
        <thead><tr>
          <th style="text-align:center;"><input type="checkbox" id="import-select-all" ${allChecked?'checked':''}></th>
          <th>Date</th><th>Amount</th><th>Target</th><th>Unit</th><th>Category / Note</th>
        </tr></thead>
        <tbody>
        ${rows.map((r,i)=>`<tr class="${r.dupWarning?'import-row-dup':''}">
          <td style="text-align:center;"><input type="checkbox" class="import-row-check" data-i="${i}" data-f="include" ${r.__include?'checked':''} ${r.noUnitDetected?'disabled title="Select a unit first"':''}></td>
          <td><input type="date" value="${r.date}" data-i="${i}" data-f="date" style="width:130px"></td>
          <td><input type="number" step="0.01" value="${r.amount}" data-i="${i}" data-f="amount" style="width:100px"></td>
          <td><select data-i="${i}" data-f="kind" style="width:150px">
            <option value="income" ${r.kind==='income'?'selected':''}>Income</option>
            <option value="expense-constant" ${r.kind==='expense-constant'?'selected':''}>Expense — Constant</option>
            <option value="expense-variable" ${r.kind==='expense-variable'?'selected':''}>Expense — Variable</option>
          </select></td>
          <td><select data-i="${i}" data-f="unitChoice" style="width:190px">
            ${r.noUnitDetected ? `<option value="" selected>— Select unit —</option>` : ''}
            ${r.isNewUnit ? `<option value="NEW" selected>+ New unit: ${escapeHtml(r.unitText)}</option>` : ''}
            ${db.units.map(u=>`<option value="${u.id}" ${!r.isNewUnit && !r.noUnitDetected && u.id===r.unitId?'selected':''}>${escapeHtml(u.name)}</option>`).join('')}
            ${!r.isNewUnit && !r.noUnitDetected && r.unitText ? `<option value="NEW:${escapeHtml(r.unitText)}">+ New unit: ${escapeHtml(r.unitText)}</option>` : ''}
          </select>
          <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;">
            ${r.isNewUnit?`<span class="tag import-new-tag">new</span>`:''}
            ${r.noUnitDetected?`<span class="tag import-dup-tag" style="background:rgba(163,39,27,.14);color:#a3271b;">no unit detected</span>`:''}
            ${r.dupWarning?`<span class="tag import-dup-tag" title="${escapeHtml(r.dupWarning)}">⚠ possible duplicate</span>`:''}
          </div></td>
          <td><input type="text" value="${escapeHtml(r.category)}" data-i="${i}" data-f="category" style="width:170px"></td>
        </tr>`).join('')}
        </tbody>
      </table></div>
    `;
    document.getElementById('import-select-all').addEventListener('change', e=>{
      rows.forEach(r=>{ if(!r.noUnitDetected) r.__include = e.target.checked; });
      draw();
    });
    wrap.querySelectorAll('input,select').forEach(el=>{
      const i = +el.dataset.i, f = el.dataset.f;
      if(f==='include'){
        el.addEventListener('change', e=>{ rows[i].__include = e.target.checked; });
        return;
      }
      if(f==='unitChoice'){
        el.addEventListener('change', e=>{
          const v = e.target.value;
          if(v===''){ rows[i].isNewUnit=false; rows[i].unitId=null; rows[i].noUnitDetected=true; }
          else if(v==='NEW' || v.startsWith('NEW:')){ rows[i].isNewUnit = true; rows[i].unitId = null; rows[i].noUnitDetected=false; if(v.startsWith('NEW:')) rows[i].unitText = v.slice(4); }
          else { rows[i].isNewUnit = false; rows[i].unitId = v; rows[i].noUnitDetected=false; }
          rows[i].__include = undefined; // re-evaluate default now that the target changed
          draw();
        });
        return;
      }
      // date / amount / kind / category: capture every keystroke, but only
      // re-run duplicate detection (and redraw) once the value is committed,
      // so typing an amount doesn't yank focus away mid-keystroke.
      el.addEventListener('input', e=>{ rows[i][f] = f==='amount' ? parseFloat(e.target.value)||0 : e.target.value; });
      if(f==='date' || f==='amount' || f==='kind'){
        el.addEventListener('change', ()=>{ rows[i].__include = undefined; draw(); });
      }
    });
  }
  draw();

  const confirmBtn = document.getElementById('import-confirm-btn');
  confirmBtn.style.display='inline-flex';
  confirmBtn.onclick = ()=>{
    if(!db.units.length && !rows.some(r=>r.isNewUnit)){ toast('Add at least one unit before importing','error'); return; }
    const toImport = rows.filter(r=>r.__include===true && !r.noUnitDetected);
    const skippedNoUnit = rows.filter(r=>r.noUnitDetected).length;
    const skipped = rows.length - toImport.length - skippedNoUnit;
    if(!toImport.length){ toast('Nothing selected to import — tick "Import" on at least one row with a unit chosen','error'); return; }
    let nInc=0, nExp=0, nNewUnits=0, nSkippedNoUnit=0;
    const createdUnitsByName = {}; // cache so repeated rows for the same new unit share one unit record
    toImport.forEach(r=>{
      let unitId = r.unitId;
      if(r.isNewUnit){
        const key = (r.unitText||'').toLowerCase();
        if(createdUnitsByName[key]){
          unitId = createdUnitsByName[key];
        } else {
          // ensure there's a building to attach the new unit to — only ever
          // synthesize one if truly none exists, and prefer a matched building.
          let buildingId = null;
          if(r.buildingText){
            const foundB = db.buildings.find(bd=>bd.name.toLowerCase()===r.buildingText.toLowerCase());
            if(foundB) buildingId = foundB.id;
          }
          if(!buildingId) buildingId = db.buildings[0] && db.buildings[0].id;
          if(!buildingId){
            const nb = {id:uid(), name: r.buildingText || 'Imported', address:'', createdAt:new Date().toISOString()};
            db.buildings.push(nb);
            buildingId = nb.id;
          }
          const nu = {id:uid(), buildingId, name: r.unitText || `Imported unit ${nNewUnits+1}`, visible:true, createdAt:new Date().toISOString()};
          db.units.push(nu);
          createdUnitsByName[key] = nu.id;
          unitId = nu.id;
          nNewUnits++;
        }
      }
      // Each row must land on the unit that was actually detected/chosen for
      // it — never on an arbitrary default — so skip rather than guess.
      if(!unitId){ nSkippedNoUnit++; return; }
      if(r.kind==='income'){
        db.income.push({id:uid(), unitId, date:r.date, amount:r.amount, note:r.category, timestamp:new Date().toISOString()});
        nInc++;
      } else {
        db.expenses.push({id:uid(), unitId, type: r.kind==='expense-constant'?'constant':'variable', category:r.category||'Imported', description:'Smart import', date:r.date, amount:r.amount, timestamp:new Date().toISOString()});
        nExp++;
      }
    });
    logActivity(`Smart import added ${nInc} income and ${nExp} expense entries${nNewUnits?` (created ${nNewUnits} new unit${nNewUnits===1?'':'s'})`:''}${skipped?`, skipped ${skipped} likely duplicate(s)`:''}${(skippedNoUnit+nSkippedNoUnit)?`, skipped ${skippedNoUnit+nSkippedNoUnit} row(s) with no unit selected`:''}.`, 'create');
    persist(); closeModal(); toast(`Imported ${nInc+nExp} entries${nNewUnits?`, ${nNewUnits} new unit${nNewUnits===1?'':'s'} added`:''}${skipped?`, ${skipped} duplicate(s) skipped`:''}${skippedNoUnit?`, ${skippedNoUnit} row(s) without a unit skipped`:''}`); renderView();
  };
}

/* ============================== INIT ================================ */
async function initApp(){
  const raw = loadLocal();
  const isFirstRun = raw === null;
  db = raw || defaultDb();
  if(!db.buildings) db = Object.assign(defaultDb(), db);

  if(isFirstRun){
    // Brand-new browser/device with no local data at all: try to pull the
    // real ledger from the connected Sheet first, and only fall back to
    // sample data if that isn't configured or fails. On every load *after*
    // this, local storage is treated as the source of truth so that
    // deleting things (or the Sheet still holding stale rows because a
    // push hasn't gone through) can never silently bring old/sample data
    // back. Use the "Pull from Sheet" button in Settings to sync manually.
    let pulled = false;
    if(db.settings.useSheets && db.settings.gasUrl){
      pulled = await pullRemote();
    }
    if(!pulled && db.buildings.length===0 && db.units.length===0 && db.income.length===0){
      seed();
    }
    saveLocal();
  }

  renderShell();
  renderView();
  // keyboard: esc closes modal
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
}

initApp();
</script>
