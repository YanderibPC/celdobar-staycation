<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celdobar Staycation Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,600&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --terracotta:#c1502e;
  --terracotta-dark:#9c3f22;
  --cream:#f3ede1;
  --cream-2:#fbf8f2;
  --ink:#2b2118;
  --ink-soft:#5b4d3e;
  --teal:#3d7a6e;
  --maroon:#7a2e12;
  --purple:#5b21d6;
  --gold:#f2a81d;
  --line:#e7ddc9;
  --shadow: 0 1px 2px rgba(43,33,24,.06), 0 4px 16px rgba(43,33,24,.06);
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--gold);color:var(--ink);}

/* ---------- Layout ---------- */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:250px;flex-shrink:0;background:var(--terracotta);
  color:var(--cream-2);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.brand{padding:24px 20px 16px;text-align:center;}
.brand img{width:100%;max-width:170px;display:block;margin:0 auto 6px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15));}
.brand .tagline{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.75;font-weight:600;}

.nav{flex:1;padding:6px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;
  background:transparent;border:none;color:var(--cream-2);font-size:14.5px;font-weight:600;
  text-align:left;width:100%;opacity:.82;transition:background .15s,opacity .15s;
}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,.1);opacity:1;}
.nav-item.active{background:var(--cream-2);color:var(--terracotta-dark);opacity:1;box-shadow:var(--shadow);}
.nav-stripes{display:flex;height:5px;margin:10px 18px 4px;border-radius:3px;overflow:hidden;}
.nav-stripes span{flex:1;}
.sidebar-foot{padding:14px 18px 20px;font-size:11px;opacity:.65;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  padding:20px 32px;border-bottom:1px solid var(--line);background:var(--cream-2);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:22px;margin:0;font-weight:700;}
.topbar .sub{font-size:13px;color:var(--ink-soft);margin-top:2px;}
.topbar-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

.content{padding:28px 32px 60px;flex:1;}
.view{display:none;}
.view.active{display:block;animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Controls ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;border:1px solid transparent;
  font-size:13.5px;font-weight:600;background:var(--cream-2);color:var(--ink);border-color:var(--line);
  transition:transform .1s, box-shadow .15s;
}
.btn:hover{box-shadow:var(--shadow);}
.btn:active{transform:scale(.97);}
.btn svg{width:15px;height:15px;}
.btn-primary{background:var(--terracotta);color:#fff;border-color:var(--terracotta);}
.btn-primary:hover{background:var(--terracotta-dark);}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-ghost:hover{background:var(--line);}
.btn-danger{color:#a3271b;}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:7px;}
.btn-icon{padding:8px;}

select,input,textarea{
  font-family:inherit;font-size:13.5px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);
  background:#fff;color:var(--ink);outline:none;
}
select:focus,input:focus,textarea:focus{border-color:var(--terracotta);}
label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}
.field-row{display:flex;gap:12px;flex-wrap:wrap;}
.field-row>.field{flex:1;min-width:150px;}

.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filters select{min-width:110px;}

/* ---------- Cards / stats ---------- */
.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{
  background:var(--cream-2);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);
  border-left:5px solid var(--teal);
}
.stat-card .label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:700;}
.stat-card .value{font-size:26px;font-weight:800;margin-top:6px;font-family:'Fraunces',serif;}
.stat-card.income{border-left-color:var(--teal);}
.stat-card.expense{border-left-color:var(--maroon);}
.stat-card.net{border-left-color:var(--purple);}
.stat-card.margin{border-left-color:var(--gold);}

.card{background:var(--cream-2);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:20px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
.card-head h2,.card-head h3{margin:0;}

.chart-wrap{position:relative;height:300px;}
.chart-wrap.small{height:230px;}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);border-bottom:2px solid var(--line);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
tbody tr:hover{background:rgba(193,80,46,.05);}
.table-wrap{overflow-x:auto;}
.amt{font-family:'JetBrains Mono',monospace;font-weight:600;}
.amt.pos{color:#296648;}
.amt.neg{color:#a3271b;}
.tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em;}
.tag.constant{background:rgba(61,122,110,.15);color:var(--teal);}
.tag.variable{background:rgba(242,168,29,.18);color:#8a5f0e;}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.empty-state svg{width:38px;height:38px;opacity:.4;margin-bottom:8px;}

/* ---------- Buildings ---------- */
.building-card{margin-bottom:16px;}
.building-title{display:flex;align-items:center;gap:10px;}
.building-title .chev{transition:transform .15s;}
.building-title.collapsed .chev{transform:rotate(-90deg);}
.building-meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.unit-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.unit-row{
  display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;
  border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:border-color .15s;
}
.unit-row:hover{border-color:var(--terracotta);}
.unit-row.hidden-unit{opacity:.45;}
.status-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:99px;vertical-align:middle;margin-left:4px;}
.status-badge.active{background:rgba(61,122,110,.15);color:var(--teal);}
.status-badge.inactive{background:rgba(122,46,18,.12);color:var(--maroon);}
.unit-left{display:flex;align-items:center;gap:10px;}
.unit-dot{width:9px;height:9px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.unit-name{font-weight:700;}
.unit-sub{font-size:12px;color:var(--ink-soft);}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(43,33,24,.45);display:none;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal-overlay.active{display:flex;}
.modal{
  background:var(--cream-2);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.modal.wide{max-width:820px;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--cream-2);z-index:2;}
.modal-head h3{margin:0;font-size:18px;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--cream-2);}
.modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);line-height:1;padding:4px;}

/* ---------- Toast ---------- */
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);
  animation:toastin .2s ease; max-width:320px;}
@keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Activity Log ---------- */
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.activity-msg{font-size:13.5px;}
.activity-time{font-size:11.5px;color:var(--ink-soft);margin-top:2px;font-family:'JetBrains Mono',monospace;}

/* ---------- Smart import ---------- */
.import-drop{border:2px dashed var(--line);border-radius:12px;padding:16px;background:#fff;}
textarea#import-text{width:100%;min-height:150px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
.import-preview-table td,.import-preview-table th{white-space:nowrap;}
.badge-count{background:var(--gold);color:var(--ink);border-radius:99px;padding:1px 8px;font-size:11px;font-weight:800;margin-left:6px;}

/* ---------- Misc ---------- */
.pill-toggle{display:flex;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
.pill-toggle button{border:none;background:transparent;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;color:var(--ink-soft);}
.pill-toggle button.active{background:var(--terracotta);color:#fff;}
.switch{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch .slider{position:absolute;inset:0;background:#d8cdb8;border-radius:99px;transition:.2s;}
.switch .slider:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.switch input:checked+.slider{background:var(--teal);}
.switch input:checked+.slider:before{transform:translateX(17px);}
.hint{font-size:12px;color:var(--ink-soft);line-height:1.5;}
.divider{height:1px;background:var(--line);margin:18px 0;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.status-dot.on{background:#2e8b57;}
.status-dot.off{background:#b0a48a;}

@media print{
  .sidebar,.topbar-actions,.no-print,.row-actions{display:none!important;}
  .topbar{position:static;}
  body{background:#fff;}
  .content{padding:0;}
  .card{box-shadow:none;border:1px solid #ddd;}
}
@media(max-width:820px){
  .sidebar{width:74px;}
  .brand img{max-width:44px;}
  .brand .tagline{display:none;}
  .nav-item span.label{display:none;}
  .content{padding:20px 16px;}
  .topbar{padding:16px;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-wrap"></div>
<script>
window.APP_LOGO = "logo.jpg";

/* =========================================================================
   CELDO BAR — STAYCATION LEDGER
   Single-file app. Data layer talks to localStorage by default and can
   optionally sync full snapshots with a Google Apps Script Web App that
   reads/writes a Google Sheet (see SETUP instructions).
   ========================================================================= */

const STRIPE_COLORS = ["#3d7a6e","#7a2e12","#5b21d6","#f2a81d"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ---------------------------- utilities -------------------------------- */
const uid = () => 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);
const fmtMoney = (n) => (n<0?'-':'')+'₱'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoneyShort = (n) => {
  const abs = Math.abs(n||0);
  if(abs>=1000000) return (n<0?'-':'')+'₱'+(abs/1000000).toFixed(1)+'M';
  if(abs>=1000) return (n<0?'-':'')+'₱'+(abs/1000).toFixed(1)+'K';
  return fmtMoney(n);
};
const escapeHtml = (s) => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = (iso) => { if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); };
const fmtTimestamp = (ts) => { const d=new Date(ts); return d.toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); };
const todayISO = () => new Date().toISOString().slice(0,10);
function debounce(fn,ms){let t;return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function downloadFile(filename, content, mime){
  const blob = new Blob([content],{type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function toast(msg, kind){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  if(kind==='error'){el.style.background='#a3271b';}
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300);}, 3200);
}

/* icon helper (inline svg strings, stroke-based, minimal) */
function icon(name){

    dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',

    income:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',

    activity:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',

    trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
    eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
    eyeoff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>',
    upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',

/* ============================== DATA LAYER ==============================
   db shape: { buildings:[], units:[], income:[], expenses:[], activity:[], settings:{} }
   Persistence: localStorage always (offline cache). If settings.useSheets is
   on and a gasUrl is configured, a full JSON snapshot is also pushed to a
   Google Apps Script Web App backed by a Google Sheet, and pulled on load.
   ========================================================================== */
const STORAGE_KEY = 'celdobar_ledger_v1';

let db = null;

function defaultDb(){
  return { buildings:[], units:[], income:[], expenses:[], activity:[],
    settings:{ useSheets:false, gasUrl:'', lastSync:null } };
}

function loadLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn('local load failed', e); }
  return null;
}
function saveLocal(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }catch(e){ console.warn('local save failed', e); }
}

const pushRemote = debounce(async function(){
  if(!db.settings.useSheets || !db.settings.gasUrl) return;
  try{
    const res = await fetch(db.settings.gasUrl, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'save', payload:{
        buildings:db.buildings, units:db.units, income:db.income, expenses:db.expenses, activity:db.activity
      }})
    });
    const j = await res.json().catch(()=>({status:'ok'}));
    db.settings.lastSync = new Date().toISOString();
    updateSyncIndicator(true);
  }catch(e){
    console.warn('sheets push failed', e);
    updateSyncIndicator(false);
  }
}, 1200);

async function pullRemote(){
  if(!db.settings.useSheets || !db.settings.gasUrl) return false;
  try{
    const res = await fetch(db.settings.gasUrl+(db.settings.gasUrl.includes('?')?'&':'?')+'action=getAll');
    const j = await res.json();
    if(j && j.buildings){
      db.buildings = j.buildings||[]; db.units = j.units||[]; db.income = j.income||[];
      db.expenses = j.expenses||[]; db.activity = j.activity||db.activity;
      db.settings.lastSync = new Date().toISOString();
      updateSyncIndicator(true);
      return true;
    }
  }catch(e){ console.warn('sheets pull failed', e); updateSyncIndicator(false); }
  return false;
}

function persist(){ saveLocal(); pushRemote(); }

function updateSyncIndicator(ok){
  const el = document.getElementById('sync-indicator');
  if(!el) return;
  if(!db.settings.useSheets){ el.innerHTML = '<span class="status-dot off"></span>Local only'; return; }
  el.innerHTML = ok ? '<span class="status-dot on"></span>Synced to Sheets' : '<span class="status-dot off"></span>Sync error';
}

function logActivity(message, type){
  db.activity.unshift({ id:uid(), timestamp:new Date().toISOString(), message, type: type||'info' });

}

function seed(){
  const b1 = {id:uid(), name:'Sunset Ridge Residences', address:'Tagaytay City', createdAt:new Date().toISOString()};
  const b2 = {id:uid(), name:'Palm Court Suites', address:'Boracay, Aklan', createdAt:new Date().toISOString()};
  db.buildings.push(b1,b2);
  const u1={id:uid(),buildingId:b1.id,name:'Unit 101',visible:true,createdAt:new Date().toISOString()};
  const u2={id:uid(),buildingId:b1.id,name:'Unit 102',visible:true,createdAt:new Date().toISOString()};
  const u3={id:uid(),buildingId:b2.id,name:'Villa A',visible:true,createdAt:new Date().toISOString()};
  db.units.push(u1,u2,u3);
  const yr = new Date().getFullYear();
  [u1,u2,u3].forEach((u,ui)=>{
    for(let m=0;m<6;m++){

      db.income.push({id:uid(), unitId:u.id, date:`${yr}-${mm}-05`, amount: 28000+ui*4000+m*900, note:'Booking payouts', timestamp:new Date(yr,m,5).toISOString()});
      db.expenses.push({id:uid(), unitId:u.id, type:'constant', category:'Utilities', description:'Electricity & water', amount: 3200+ui*300, date:`${yr}-${mm}-03`, timestamp:new Date(yr,m,3).toISOString()});
      db.expenses.push({id:uid(), unitId:u.id, type:'constant', category:'Association Dues', description:'Monthly HOA dues', amount: 1500, date:`${yr}-${mm}-02`, timestamp:new Date(yr,m,2).toISOString()});
      if(m%2===0) db.expenses.push({id:uid(), unitId:u.id, type:'variable', category:'Cleaning', description:'Turnover cleaning crew', amount: 1800+ui*100, date:`${yr}-${mm}-14`, timestamp:new Date(yr,m,14).toISOString()});
      if(m%3===0) db.expenses.push({id:uid(), unitId:u.id, type:'variable', category:'Repairs', description:'Minor maintenance', amount: 950, date:`${yr}-${mm}-20`, timestamp:new Date(yr,m,20).toISOString()});
    }
  });
  logActivity('Sample data seeded for a fresh ledger.', 'info');
  saveLocal();
}

/* ---- derived helpers ---- */
function getUnit(id){ return db.units.find(u=>u.id===id); }
function getBuilding(id){ return db.buildings.find(b=>b.id===id); }
function unitsOf(buildingId){ return db.units.filter(u=>u.buildingId===buildingId); }
function incomeOf(unitId){ return db.income.filter(i=>i.unitId===unitId); }
function expensesOf(unitId){ return db.expenses.filter(e=>e.unitId===unitId); }
function yearOf(dateStr){ return parseInt((dateStr||'').slice(0,4),10); }
function monthOf(dateStr){ return parseInt((dateStr||'').slice(5,7),10)-1; }

function allYears(){
  const ys = new Set();
  db.income.forEach(i=>ys.add(yearOf(i.date)));
  db.expenses.forEach(e=>ys.add(yearOf(e.date)));
  ys.add(new Date().getFullYear());
  return Array.from(ys).filter(y=>!isNaN(y)).sort((a,b)=>b-a);
}

function filterByPeriod(list, year, month){
  return list.filter(x=>{
    if(year!=null && year!=='all' && yearOf(x.date)!==parseInt(year,10)) return false;
    if(month!=null && month!=='all' && monthOf(x.date)!==parseInt(month,10)) return false;
    return true;
  });
}

function sum(list, key){ return list.reduce((a,x)=>a+(parseFloat(x[key])||0),0); }

function computeTotals(incomeList, expenseList){
  const gross = sum(incomeList,'amount');
  const exp = sum(expenseList,'amount');
  const net = gross-exp;
  const margin = gross>0 ? (net/gross*100) : 0;
  return {gross, exp, net, margin};
}

/* ============================== MODAL SYSTEM ============================== */
function closeModal(){
  document.getElementById('modal-root').innerHTML='';
}

function openModal(html, opts){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay active" id="modal-overlay"><div class="modal ${opts&&opts.wide?'wide':''}">${html}</div></div>`;
  document.getElementById('modal-overlay').addEventListener('mousedown', (e)=>{
    if(e.target.id==='modal-overlay') closeModal();
  });
}

function fieldHtml(f, values){
  const val = values && values[f.name]!==undefined ? values[f.name] : (f.value!==undefined?f.value:'');
  if(f.type==='select'){
    return `<div class="field"><label>${f.label}</label>
      <select name="${f.name}" ${f.required?'required':''} style="width:100%">
        ${f.options.map(o=>`<option value="${escapeHtml(o.value)}" ${String(o.value)===String(val)?'selected':''}>${escapeHtml(o.label)}</option>`).join('')}
      </select></div>`;
  }
  if(f.type==='textarea'){
    return `<div class="field"><label>${f.label}</label><textarea name="${f.name}" style="width:100%" rows="3" ${f.required?'required':''}>${escapeHtml(val)}</textarea></div>`;
  }
  return `<div class="field"><label>${f.label}</label>
    <input type="${f.type||'text'}" name="${f.name}" value="${escapeHtml(val)}" style="width:100%" ${f.step?`step="${f.step}"`:''} ${f.required?'required':''} ${f.placeholder?`placeholder="${escapeHtml(f.placeholder)}"`:''}>
  </div>`;
}

function openFormModal({title, fields, values, submitLabel, onSubmit, extraHtml}){
  const rows = [];
  let i=0;
  while(i<fields.length){
    if(fields[i].half){
      const pair=[fields[i]]; i++;
      if(fields[i]&&fields[i].half){ pair.push(fields[i]); i++; }
      rows.push(`<div class="field-row">${pair.map(f=>fieldHtml(f,values)).join('')}</div>`);
    } else { rows.push(fieldHtml(fields[i], values)); i++; }
  }
  openModal(`
    <div class="modal-head"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">${icon('close')}</button></div>
    <form id="modal-form">
      <div class="modal-body">${rows.join('')}${extraHtml||''}</div>
      <div class="modal-foot">
        <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${submitLabel||'Save'}</button>
      </div>
    </form>
  `);
  document.getElementById('modal-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {};
    fields.forEach(f=>{ data[f.name] = fd.get(f.name); });
    onSubmit(data);
  });
}

function confirmModal(message, onConfirm){
  openModal(`
    <div class="modal-head"><h3>Please confirm</h3><button class="modal-close" onclick="closeModal()">${icon('close')}</button></div>
    <div class="modal-body"><p style="margin:0 0 6px;">${message}</p><p class="hint">This action cannot be undone.</p></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="background:#a3271b;border-color:#a3271b" id="confirm-yes">Delete</button>
    </div>
  `);
  document.getElementById('confirm-yes').addEventListener('click', ()=>{ onConfirm(); closeModal(); });
}

function emptyState(title, sub, gotoView){

function groupSum(list, key){
  const out = {};
  list.forEach(x=>{ const k = x[key]||'Other'; out[k]=(out[k]||0)+(parseFloat(x.amount)||0); });
  return out;
}
function paletteFor(n){
  const base = ['#f2a81d','#c1502e','#3d7a6e','#5b21d6','#a3271b','#296648','#8a5f0e','#9c3f22'];
  const out=[]; for(let i=0;i<n;i++) out.push(base[i%base.length]); return out;
}
function destroyChart(key){ if(state.charts[key]){ state.charts[key].destroy(); delete state.charts[key]; } }
function baseChartOptions(title){
  return { responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{position:'bottom', labels:{boxWidth:12,font:{size:11}}}, title:{display:false} },
    scales:{ y:{ ticks:{ callback:v=>fmtMoneyShort(v) }, grid:{color:'#efe6d3'} }, x:{ grid:{display:false} } } };
}

        }).join('') : `<div class="empty-state" style="padding:16px;">No units in this building yet.</div>`}

    </div>`;
  }).join('');

  // wire events
  c.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click', ()=>{
    const id = el.dataset.toggle; state.buildings.collapsed[id] = !state.buildings.collapsed[id]; renderBuildings(c);
  }));
  c.querySelectorAll('[data-add-unit]').forEach(el=>el.addEventListener('click', ()=>openUnitForm(null, el.dataset.addUnit)));
  c.querySelectorAll('[data-edit-building]').forEach(el=>el.addEventListener('click', ()=>openBuildingForm(getBuilding(el.dataset.editBuilding))));
  c.querySelectorAll('[data-del-building]').forEach(el=>el.addEventListener('click', ()=>{
    const b = getBuilding(el.dataset.delBuilding);
    confirmModal(`Delete "${escapeHtml(b.name)}" and all of its units, income and expense records?`, ()=>{
      const unitIds = unitsOf(b.id).map(u=>u.id);
      db.units = db.units.filter(u=>u.buildingId!==b.id);
      db.income = db.income.filter(i=>!unitIds.includes(i.unitId));
      db.expenses = db.expenses.filter(e=>!unitIds.includes(e.unitId));
      db.buildings = db.buildings.filter(x=>x.id!==b.id);
      logActivity(`Deleted building "${b.name}" and its ${unitIds.length} unit(s).`,'delete');
      persist(); renderBuildings(c); toast('Building deleted');
    });
  }));
  c.querySelectorAll('[data-toggle-active]').forEach(el=>el.addEventListener('change', (e)=>{
    e.stopPropagation();
    const u = getUnit(el.dataset.toggleActive); u.visible = e.target.checked;
    logActivity(`Marked unit "${u.name}" as ${u.visible?'active':'inactive'}.`,'update');
    persist(); renderBuildings(c);
  }));
  c.querySelectorAll('[data-edit-unit]').forEach(el=>el.addEventListener('click',(e)=>{ e.stopPropagation(); openUnitForm(getUnit(el.dataset.editUnit)); }));
  c.querySelectorAll('[data-del-unit]').forEach(el=>el.addEventListener('click',(e)=>{
    e.stopPropagation();
    const u = getUnit(el.dataset.delUnit);
    confirmModal(`Delete unit "${escapeHtml(u.name)}" and all of its income/expense records?`, ()=>{
      db.income = db.income.filter(i=>i.unitId!==u.id);
      db.expenses = db.expenses.filter(e=>e.unitId!==u.id);
      db.units = db.units.filter(x=>x.id!==u.id);
      logActivity(`Deleted unit "${u.name}".`,'delete');
      persist(); renderBuildings(c); toast('Unit deleted');
    });
  }));
  c.querySelectorAll('.unit-row').forEach(el=>el.addEventListener('click',(e)=>{
    if(e.target.closest('[data-toggle-active],[data-edit-unit],[data-del-unit]')) return;
    openUnitDetail(el.dataset.unit);
  }));

  document.getElementById('add-building-btn').addEventListener('click', ()=>openBuildingForm());
  document.getElementById('toggle-show-hidden').addEventListener('change', e=>{ state.buildings.showHidden=e.target.checked; renderBuildings(c); });
}

function openBuildingForm(building){
  openFormModal({
    title: building? 'Edit building' : 'Add building',
    fields:[
      {name:'name', label:'Building name', required:true},
      {name:'address', label:'Address / location'},
    ],
    values: building||{},
    onSubmit(data){
      if(!data.name.trim()){ toast('Building name is required','error'); return; }
      if(building){
        building.name=data.name; building.address=data.address;
        logActivity(`Updated building "${data.name}".`,'update');
        toast('Building updated');
      } else {
        db.buildings.push({id:uid(), name:data.name, address:data.address, createdAt:new Date().toISOString()});
        logActivity(`Added building "${data.name}".`,'create');
        toast('Building added');
      }
      persist(); closeModal(); renderView();
    }
  });
}

function openUnitForm(unit, presetBuildingId){
  openFormModal({
    title: unit? 'Edit unit' : 'Add unit',
    fields:[
      {name:'buildingId', label:'Building', type:'select', options:buildingOptions(false), required:true},
      {name:'name', label:'Unit name', required:true, placeholder:'e.g. Unit 203 / Villa B'},
    ],
    values: unit || {buildingId: presetBuildingId||(db.buildings[0]&&db.buildings[0].id)},

        logActivity(`Updated unit "${data.name}".`,'update');
        toast('Unit updated');
      } else {
        db.units.push({id:uid(), buildingId:data.buildingId, name:data.name, visible:true, createdAt:new Date().toISOString()});
        logActivity(`Added unit "${data.name}".`,'create');
        toast('Unit added');
      }
      persist(); closeModal(); renderView();
    }
  });
}

function openUnitDetail(unitId){
  const u = getUnit(unitId); if(!u) return;
  const b = getBuilding(u.buildingId);
  const detailState = { year: allYears()[0]||new Date().getFullYear() };
  renderUnitDetailModal(u,b,detailState);
}

function renderUnitDetailModal(u,b,ds){
  const year = ds.year;
  const inc = db.income.filter(i=>i.unitId===u.id && yearOf(i.date)===parseInt(year,10));
  const exp = db.expenses.filter(e=>e.unitId===u.id && yearOf(e.date)===parseInt(year,10));
  const monthRows = MONTHS.map((mLabel,m)=>{
    const mi = sum(inc.filter(i=>monthOf(i.date)===m),'amount');
    const me = sum(exp.filter(e=>monthOf(e.date)===m),'amount');
    const net = mi-me; const margin = mi>0?(net/mi*100):0;
    return {mLabel,mi,me,net,margin,m};
  });
  const totals = computeTotals(inc,exp);
  const catTotals = groupSum(exp,'category');

  openModal(`
    <div class="modal-head">
      <h3>${escapeHtml(u.name)} <span style="font-weight:400;color:var(--ink-soft);font-size:14px;">— ${escapeHtml(b?b.name:'')}</span></h3>
      <button class="modal-close" onclick="closeModal()">${icon('close')}</button>
    </div>
    <div class="modal-body">
      <div class="filters" style="margin-bottom:16px;">
        <select id="ud-year">${yearOptions(false).map(o=>`<option value="${o.value}" ${o.value==year?'selected':''}>${o.label}</option>`).join('')}</select>
      </div>
      <div class="grid-stats" style="margin-bottom:18px;">
        <div class="stat-card income"><div class="label">Gross Income</div><div class="value" style="font-size:20px;">${fmtMoney(totals.gross)}</div></div>
        <div class="stat-card expense"><div class="label">Expenses</div><div class="value" style="font-size:20px;">${fmtMoney(totals.exp)}</div></div>
        <div class="stat-card net"><div class="label">Net Income</div><div class="value" style="font-size:20px;">${fmtMoney(totals.net)}</div></div>
        <div class="stat-card margin"><div class="label">Margin</div><div class="value" style="font-size:20px;">${totals.margin.toFixed(1)}%</div></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Month</th><th>Gross Income</th><th>Expenses</th><th>Net</th><th>Margin</th></tr></thead>
          <tbody>
          ${monthRows.map(r=>`<tr><td>${r.mLabel}</td><td class="amt pos">${fmtMoney(r.mi)}</td><td class="amt neg">${fmtMoney(r.me)}</td>
            <td class="amt ${r.net>=0?'pos':'neg'}">${fmtMoney(r.net)}</td><td>${r.mi>0?r.margin.toFixed(1)+'%':'—'}</td></tr>`).join('')}
          </tbody>
          <tfoot><tr style="font-weight:800;border-top:2px solid var(--line);"><td>Total</td><td class="amt pos">${fmtMoney(totals.gross)}</td>
            <td class="amt neg">${fmtMoney(totals.exp)}</td><td class="amt ${totals.net>=0?'pos':'neg'}">${fmtMoney(totals.net)}</td><td>${totals.margin.toFixed(1)}%</td></tr></tfoot>
        </table>
      </div>
      <div class="divider"></div>
      <h3 style="font-size:15px;margin:0 0 10px;">Itemized expenses — ${year}</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Description</th><th>Amount</th></tr></thead>
          <tbody>
          ${exp.length? exp.sort((a,b2)=>a.date<b2.date?1:-1).map(e=>`<tr><td>${fmtDate(e.date)}</td><td><span class="tag ${e.type}">${e.type}</span></td>
            <td>${escapeHtml(e.category)}</td><td>${escapeHtml(e.description||'—')}</td><td class="amt neg">${fmtMoney(e.amount)}</td></tr>`).join('')
            : `<tr><td colspan="5" class="empty-state">No expenses logged for ${year}.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
  `, {wide:true});

  document.getElementById('ud-year').addEventListener('change', e=>{ ds.year=e.target.value; renderUnitDetailModal(u,b,ds); });
}

const EXPENSE_CATEGORIES = {

  variable: ['Cleaning','Repairs','Restocking/Supplies','Guest Amenities','Platform/Booking Fees','Marketing','Other Variable'],
};

      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Unit</th><th>Category</th><th>Description</th><th>Amount</th><th></th></tr></thead>
          <tbody>
          ${list.length? list.map(e=>{
            const u = getUnit(e.unitId);
            return `<tr><td>${fmtDate(e.date)}</td><td>${escapeHtml(u?u.name:'—')}</td><td>${escapeHtml(e.category)}</td>
              <td>${escapeHtml(e.description||'—')}</td><td class="amt neg">${fmtMoney(e.amount)}</td>

        </table>

  `;

  c.querySelectorAll('[data-kind]').forEach(b=>b.addEventListener('click',()=>{ s.kind=b.dataset.kind; renderExpenses(c); }));
  document.getElementById('exp-building').addEventListener('change', e=>{ s.building=e.target.value; s.unit='all'; renderExpenses(c); });
  document.getElementById('exp-unit').addEventListener('change', e=>{ s.unit=e.target.value; renderExpenses(c); });
  document.getElementById('exp-year').addEventListener('change', e=>{ s.year=e.target.value; renderExpenses(c); });
  document.getElementById('exp-month').addEventListener('change', e=>{ s.month=e.target.value; renderExpenses(c); });
  document.getElementById('add-expense-btn').addEventListener('click', ()=>openExpenseForm(null, s.kind));
  c.querySelectorAll('[data-edit-exp]').forEach(b=>b.addEventListener('click',()=>openExpenseForm(db.expenses.find(x=>x.id===b.dataset.editExp))));
  c.querySelectorAll('[data-del-exp]').forEach(b=>b.addEventListener('click',()=>{
    const e = db.expenses.find(x=>x.id===b.dataset.delExp);
    confirmModal(`Delete this expense entry (${fmtMoney(e.amount)})?`, ()=>{
      db.expenses = db.expenses.filter(x=>x.id!==e.id);

function openExpenseForm(expense, presetKind){
  if(db.units.length===0){ toast('Add a unit first before logging expenses.','error'); return; }
  const kind = expense? expense.type : (presetKind||'constant');
  openFormModal({
    title: expense? 'Edit expense' : 'Add expense',
    fields:[
      {name:'unitId', label:'Unit', type:'select', options:unitOptions(false), required:true, half:true},
      {name:'type', label:'Type', type:'select', options:[{value:'constant',label:'Constant'},{value:'variable',label:'Variable'}], required:true, half:true},
      {name:'category', label:'Category', type:'select', options:[...EXPENSE_CATEGORIES.constant,...EXPENSE_CATEGORIES.variable].filter((v,i,a)=>a.indexOf(v)===i).map(x=>({value:x,label:x})), required:true, half:true},
      {name:'date', label:'Date', type:'date', required:true, half:true},
      {name:'amount', label:'Amount (₱)', type:'number', step:'0.01', required:true, half:true},
      {name:'description', label:'Description', type:'text', half:true},
    ],
    values: expense || {unitId:db.units[0].id, type:kind, date:todayISO(), category:kind==='constant'?EXPENSE_CATEGORIES.constant[0]:EXPENSE_CATEGORIES.variable[0]},
    onSubmit(data){
      const amount = parseFloat(data.amount);
      if(!amount || amount<=0){ toast('Enter a valid amount','error'); return; }
      if(expense){
        Object.assign(expense, {unitId:data.unitId, type:data.type, category:data.category, date:data.date, amount, description:data.description});
        logActivity(`Updated expense "${data.category}" (${fmtMoney(amount)}).`,'update');
        toast('Expense updated');
      } else {
        db.expenses.push({id:uid(), unitId:data.unitId, type:data.type, category:data.category, date:data.date, amount, description:data.description, timestamp:new Date().toISOString()});
        logActivity(`Added ${data.type} expense "${data.category}" (${fmtMoney(amount)}).`,'create');
        toast('Expense added');
      }
      persist(); closeModal(); renderView();
    }
  });
}

  `;

  const bind = ()=>{
    document.getElementById('rep-scope').addEventListener('change', e=>{ s.scope=e.target.value; if(s.scope!=='unit') s.unit=''; if(!s.building && db.buildings[0]) s.building=db.buildings[0].id; renderReports(c); });
    const rb = document.getElementById('rep-building'); if(rb) rb.addEventListener('change', e=>{ s.building=e.target.value; renderReports(c); });
    const ru = document.getElementById('rep-unit'); if(ru) ru.addEventListener('change', e=>{ s.unit=e.target.value; renderReports(c); });
    document.getElementById('rep-period').addEventListener('change', e=>{ s.period=e.target.value; renderReports(c); });
    const ry = document.getElementById('rep-year'); if(ry) ry.addEventListener('change', e=>{ s.year=e.target.value; renderReports(c); });
    const rm = document.getElementById('rep-month'); if(rm) rm.addEventListener('change', e=>{ s.month=e.target.value; renderReports(c); });
    document.getElementById('export-csv-btn').addEventListener('click', exportReportCsv);
    document.getElementById('print-pdf-btn').addEventListener('click', ()=>window.print());
  };
  bind();

  // resolve unit scope
  let unitIds;
  let scopeLabel = 'All properties';
  if(s.scope==='total'){ unitIds = db.units.map(u=>u.id); }
  else if(s.scope==='building'){
    if(!s.building && db.buildings[0]) s.building = db.buildings[0].id;
    unitIds = unitsOf(s.building).map(u=>u.id);
    scopeLabel = getBuilding(s.building)?.name || 'Building';
  } else {
    if(!s.unit && db.units[0]) s.unit = db.units[0].id;
    unitIds = s.unit ? [s.unit] : [];
    scopeLabel = getUnit(s.unit)?.name || 'Unit';
  }

  let year = s.period==='all' ? 'all' : s.year;
  let month = s.period==='month' ? s.month : 'all';

  const inc = filterByPeriod(db.income.filter(i=>unitIds.includes(i.unitId)), year, month);
  const exp = filterByPeriod(db.expenses.filter(e=>unitIds.includes(e.unitId)), year, month);
  const t = computeTotals(inc, exp);
  const periodLabel = s.period==='all' ? 'All time' : s.period==='year' ? `Year ${s.year}` : `${MONTHS_FULL[parseInt(s.month,10)]} ${s.year}`;

  const out = document.getElementById('report-output');
  out.innerHTML = `
    <div class="grid-stats">
      <div class="stat-card income"><div class="label">Gross Income</div><div class="value">${fmtMoney(t.gross)}</div></div>
      <div class="stat-card expense"><div class="label">Expenses</div><div class="value">${fmtMoney(t.exp)}</div></div>
      <div class="stat-card net"><div class="label">Net Income</div><div class="value">${fmtMoney(t.net)}</div></div>
      <div class="stat-card margin"><div class="label">Margin</div><div class="value">${t.margin.toFixed(1)}%</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-head"><h3>${s.period==='month'?'Category breakdown':'Monthly comparison'} — ${escapeHtml(scopeLabel)}</h3></div>
        <div class="chart-wrap"><canvas id="chart-rep-bar"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Expense categories</h3></div>
        <div class="chart-wrap"><canvas id="chart-rep-pie"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h3>${escapeHtml(scopeLabel)} · ${periodLabel}</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Unit</th><th>Category / Note</th><th>Amount</th></tr></thead>
          <tbody>
          ${[...inc.map(i=>({...i,__t:'Income',cat:i.note||'Gross income'})), ...exp.map(e=>({...e,__t:'Expense',cat:e.category}))]
            .sort((a,b)=>b.date.localeCompare(a.date))
            .map(x=>`<tr><td>${fmtDate(x.date)}</td><td><span class="tag ${x.__t==='Income'?'constant':'variable'}">${x.__t}</span></td>
              <td>${escapeHtml(getUnit(x.unitId)?.name||'—')}</td><td>${escapeHtml(x.cat)}</td>
              <td class="amt ${x.__t==='Income'?'pos':'neg'}">${fmtMoney(x.amount)}</td></tr>`).join('') || `<tr><td colspan="5" class="empty-state">No records for this scope/period.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;

  destroyChart('rep-bar'); destroyChart('rep-pie');

  if(s.period==='month'){
    const catInc = groupSum(inc,'note'); const catExp = groupSum(exp,'category');
    state.charts['rep-bar'] = new Chart(document.getElementById('chart-rep-bar'), {
      type:'bar', data:{ labels:['Income','Expenses','Net'], datasets:[{ data:[t.gross,t.exp,t.net],
        backgroundColor:[STRIPE_COLORS[0],STRIPE_COLORS[1],STRIPE_COLORS[2]], borderRadius:6 }]},
      options: {...baseChartOptions(), plugins:{legend:{display:false}}}
    });
  } else {
    const yr = s.period==='year' ? parseInt(s.year,10) : new Date().getFullYear();
    const mi = MONTHS.map((_,m)=>sum(db.income.filter(i=>unitIds.includes(i.unitId) && yearOf(i.date)===(s.period==='all'?yearOf(i.date):yr) && monthOf(i.date)===m),'amount'));
    const me = MONTHS.map((_,m)=>sum(db.expenses.filter(e=>unitIds.includes(e.unitId) && yearOf(e.date)===(s.period==='all'?yearOf(e.date):yr) && monthOf(e.date)===m),'amount'));
    state.charts['rep-bar'] = new Chart(document.getElementById('chart-rep-bar'), {
      type:'bar', data:{ labels:MONTHS, datasets:[
        {label:'Income', data:mi, backgroundColor:STRIPE_COLORS[0], borderRadius:5},
        {label:'Expenses', data:me, backgroundColor:STRIPE_COLORS[1], borderRadius:5},
      ]}, options: baseChartOptions()
    });
  }

  const expByCat = groupSum(exp,'category');
  const catKeys = Object.keys(expByCat);
  state.charts['rep-pie'] = new Chart(document.getElementById('chart-rep-pie'), {
    type: 'pie',
    data:{ labels: catKeys.length?catKeys:['No expenses'], datasets:[{ data: catKeys.length?Object.values(expByCat):[1],
      backgroundColor: catKeys.length?paletteFor(catKeys.length):['#e7ddc9'] }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}} }
  });

  window.__reportRows = [...inc.map(i=>({date:i.date,type:'Income',unit:getUnit(i.unitId)?.name||'',category:i.note||'Gross income',amount:i.amount})),
    ...exp.map(e=>({date:e.date,type:'Expense',unit:getUnit(e.unitId)?.name||'',category:e.category,amount:e.amount}))];
}

function exportReportCsv(){
  const rows = window.__reportRows||[];
  let csv = 'Date,Type,Unit,Category,Amount\n';
  rows.forEach(r=>{ csv += `${r.date},${r.type},"${(r.unit||'').replace(/"/g,'""')}","${(r.category||'').replace(/"/g,'""')}",${r.amount}\n`; });
  downloadFile(`celdobar-report-${todayISO()}.csv`, csv, 'text/csv');
  toast('CSV exported');
  logActivity('Exported a report to CSV.', 'info');
}

/* ============================== ACTIVITY LOG ================================ */
function renderActivity(c){
  setTopbar('Activity Log', 'Real-time, timestamped history of every change to this ledger', `
    <input id="activity-search" placeholder="Search activity…" style="min-width:220px;">
  `);
  const draw = (q)=>{
    let list = db.activity;
    if(q) list = list.filter(a=>a.message.toLowerCase().includes(q.toLowerCase()));
    const colors = {create:'#296648', update:'#8a5f0e', delete:'#a3271b', info:'#5b21d6'};
    document.getElementById('activity-list-wrap').innerHTML = list.length ? list.map(a=>`
      <div class="activity-item">
        <span class="activity-dot" style="background:${colors[a.type]||'#5b21d6'}"></span>
        <div><div class="activity-msg">${escapeHtml(a.message)}</div><div class="activity-time">${fmtTimestamp(a.timestamp)}</div></div>
      </div>`).join('') : `<div class="empty-state">${icon('empty')}<p>No activity recorded yet.</p></div>`;
  };
  c.innerHTML = `<div class="card"><div id="activity-list-wrap"></div></div>`;
  draw('');
  document.getElementById('activity-search').addEventListener('input', e=>draw(e.target.value));
}

      <div style="display:flex;gap:10px;flex-wrap:wrap;">

/* ============================== SMART IMPORT ================================
   Accepts arbitrary pasted text (CSV, TSV, Excel copy-paste, or loosely
   formatted lines) and heuristically maps it into Income or Expense rows.
   ============================================================================ */
function openSmartImport(){
  openModal(`
    <div class="modal-head"><h3>Smart import</h3><button class="modal-close" onclick="closeModal()">${icon('close')}</button></div>
    <div class="modal-body">
      <div class="import-drop">
        <label>Paste your data below</label>
        <textarea id="import-text" placeholder="Paste rows copied from Excel/Google Sheets/Notes...&#10;e.g.&#10;Unit 101, 2026-05-05, 28000, income, Airbnb payout&#10;Unit 101, 2026-05-14, 1800, cleaning, Turnover crew"></textarea>
        <div class="field-row" style="margin-top:12px;">
          <div class="field">
            <label>Default target (used if a row's type is ambiguous)</label>
            <select id="import-target">
              <option value="auto">Auto-detect per row</option>
              <option value="income">Income</option>
              <option value="expense-constant">Expense — Constant</option>
              <option value="expense-variable">Expense — Variable</option>
            </select>
          </div>
          <div class="field">
            <label>Default unit (used if a row's unit can't be matched)</label>
            <select id="import-unit">${unitOptions(false).map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}</select>
          </div>
        </div>
        <button class="btn btn-primary" id="import-parse-btn" type="button">${icon('upload')} Parse data</button>
      </div>
      <div id="import-preview-wrap" style="margin-top:18px;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="import-confirm-btn" style="display:none;">Confirm import</button>
    </div>
  `, {wide:true});

  document.getElementById('import-parse-btn').addEventListener('click', ()=>{
    const raw = document.getElementById('import-text').value;
    if(!raw.trim()){ toast('Paste some data first','error'); return; }
    const rows = smartParse(raw);
    renderImportPreview(rows);
  });
}

function smartParse(raw){
  raw = raw.trim();
  // detect delimiter: tab > comma > multiple-spaces
  let delim = '\t';
  if(!raw.includes('\t')){
    const commaLines = raw.split('\n').filter(l=>l.includes(','));
    delim = commaLines.length > raw.split('\n').length/2 ? ',' : null;
  }
  let rows;
  if(delim){
    const parsed = Papa.parse(raw, {delimiter: delim, skipEmptyLines:true});
    rows = parsed.data;
  } else {
    rows = raw.split('\n').filter(l=>l.trim()).map(l=>l.trim().split(/\s{2,}|\s*\|\s*|,\s*/).filter(Boolean));
  }
  rows = rows.filter(r=>r.length && r.join('').trim());

  // detect header row
  const headerKeywords = ['date','unit','amount','category','type','note','description','income','expense','property','building'];
  let headerIdx = -1;
  const firstRow = rows[0].map(x=>String(x).toLowerCase());
  if(firstRow.some(cell=>headerKeywords.some(k=>cell.includes(k)))) headerIdx = 0;

  let colMap = {};
  let dataRows = rows;
  if(headerIdx===0){
    dataRows = rows.slice(1);
    firstRow.forEach((h,i)=>{
      if(/date/.test(h)) colMap.date=i;
      else if(/amount|amt|total|price|cost/.test(h)) colMap.amount=i;
      else if(/unit|room|property/.test(h)) colMap.unit=i;
      else if(/building/.test(h)) colMap.building=i;
      else if(/category|cat/.test(h)) colMap.category=i;
      else if(/type/.test(h)) colMap.type=i;
      else if(/note|desc|memo|source/.test(h)) colMap.note=i;
    });
  }

  const dateRe = /(\d{4}-\d{1,2}-\d{1,2})|(\d{1,2}\/\d{1,2}\/\d{2,4})/;
  const amountRe = /-?[₱$]?\s?[\d,]+\.?\d*/;

  const parsedRows = dataRows.map(cells=>{
    cells = cells.map(x=>String(x??'').trim());
    let date = colMap.date!==undefined ? cells[colMap.date] : null;
    let amount = colMap.amount!==undefined ? cells[colMap.amount] : null;
    let unitText = colMap.unit!==undefined ? cells[colMap.unit] : null;
    let category = colMap.category!==undefined ? cells[colMap.category] : null;
    let typeText = colMap.type!==undefined ? cells[colMap.type] : null;
    let note = colMap.note!==undefined ? cells[colMap.note] : null;

    // fallback: scan all cells for whatever wasn't mapped
    cells.forEach(cell=>{
      if(!date && dateRe.test(cell)) date = cell;
      else if(!amount && /^[₱$]?-?[\d,]+(\.\d+)?$/.test(cell.replace(/\s/g,''))) amount = cell;
    });
    if(!unitText){
      const match = db.units.find(u=>cells.some(c=>c.toLowerCase().includes(u.name.toLowerCase())));
      if(match) unitText = match.name;
    }
    if(!category && !colMap.category){
      const nonDateAmount = cells.filter(c=>c!==date && c!==amount);
      category = nonDateAmount.find(c=>isNaN(parseFloat(c))) || 'Imported';
    }

    // normalize date
    let normDate = null;
    if(date){
      const iso = date.match(/\d{4}-\d{1,2}-\d{1,2}/);
      if(iso){ const [y,m,d]=iso[0].split('-'); normDate = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
      else {
        const us = date.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
        if(us){ let [_,mm,dd,yy]=us; if(yy.length===2) yy='20'+yy; normDate = `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`; }
      }
    }
    if(!normDate) normDate = todayISO();

    let normAmount = amount ? parseFloat(String(amount).replace(/[₱$,\s]/g,'')) : NaN;

    // detect type
    let kind = 'expense-variable';
    const allText = (typeText||'')+' '+(category||'')+' '+(note||'')+' '+cells.join(' ');
    if(/income|payout|booking|revenue|gross/i.test(allText)) kind='income';
    else if(/constant|fixed|utilit|dues|insurance|rent|amortization|subscription/i.test(allText)) kind='expense-constant';
    else if(/variable|clean|repair|suppl|marketing|maintenance/i.test(allText)) kind='expense-variable';

    // resolve unit id
    let unitId = null;
    if(unitText){
      const found = db.units.find(u=>u.name.toLowerCase()===String(unitText).toLowerCase()) ||
                     db.units.find(u=>u.name.toLowerCase().includes(String(unitText).toLowerCase()));
      if(found) unitId = found.id;
    }

    return { date:normDate, amount:isNaN(normAmount)?0:normAmount, unitText:unitText||'', unitId, category:category||note||'Imported', note:note||category||'Imported', kind, raw:cells.join(' | ') };
  }).filter(r=>r.amount>0);

  return parsedRows;
}

function renderImportPreview(rows){
  const wrap = document.getElementById('import-preview-wrap');
  if(!rows.length){ wrap.innerHTML = `<div class="empty-state">Could not detect any usable rows. Try including a header row (date, unit, amount, category).</div>`; return; }
  wrap.innerHTML = `
    <p class="hint">Detected <strong>${rows.length}</strong> row(s). Review the target and unit for each, then confirm.<span class="badge-count">${rows.length}</span></p>
    <div class="table-wrap"><table class="import-preview-table">
      <thead><tr><th>Date</th><th>Amount</th><th>Target</th><th>Unit</th><th>Category / Note</th></tr></thead>
      <tbody>
      ${rows.map((r,i)=>`<tr>
        <td><input type="date" value="${r.date}" data-i="${i}" data-f="date" style="width:130px"></td>
        <td><input type="number" step="0.01" value="${r.amount}" data-i="${i}" data-f="amount" style="width:100px"></td>
        <td><select data-i="${i}" data-f="kind" style="width:150px">
          <option value="income" ${r.kind==='income'?'selected':''}>Income</option>
          <option value="expense-constant" ${r.kind==='expense-constant'?'selected':''}>Expense — Constant</option>
          <option value="expense-variable" ${r.kind==='expense-variable'?'selected':''}>Expense — Variable</option>
        </select></td>
        <td><select data-i="${i}" data-f="unitId" style="width:170px">
          ${db.units.map(u=>`<option value="${u.id}" ${u.id===r.unitId?'selected':''}>${escapeHtml(u.name)}</option>`).join('')}
        </select></td>
        <td><input type="text" value="${escapeHtml(r.category)}" data-i="${i}" data-f="category" style="width:170px"></td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  `;
  wrap.querySelectorAll('input,select').forEach(el=>el.addEventListener('input', e=>{
    const i = +e.target.dataset.i, f = e.target.dataset.f;
    rows[i][f] = f==='amount' ? parseFloat(e.target.value)||0 : e.target.value;
  }));
  const confirmBtn = document.getElementById('import-confirm-btn');
  confirmBtn.style.display='inline-flex';
  confirmBtn.onclick = ()=>{
    if(!db.units.length){ toast('Add at least one unit before importing','error'); return; }
    let nInc=0, nExp=0;
    rows.forEach(r=>{
      const unitId = r.unitId || db.units[0].id;
      if(r.kind==='income'){
        db.income.push({id:uid(), unitId, date:r.date, amount:r.amount, note:r.category, timestamp:new Date().toISOString()});
        nInc++;
      } else {
        db.expenses.push({id:uid(), unitId, type: r.kind==='expense-constant'?'constant':'variable', category:r.category||'Imported', description:'Smart import', date:r.date, amount:r.amount, timestamp:new Date().toISOString()});
        nExp++;
      }
    });
    logActivity(`Smart import added ${nInc} income and ${nExp} expense entries.`, 'create');
    persist(); closeModal(); toast(`Imported ${nInc+nExp} entries`); renderView();
  };
}

/* ============================== INIT ================================ */
async function initApp(){
  const raw = loadLocal();
  const isFirstRun = raw === null;
  db = raw || defaultDb();
  if(!db.buildings) db = Object.assign(defaultDb(), db);

  if(isFirstRun){
    // Brand-new browser/device with no local data at all: try to pull the
    // real ledger from the connected Sheet first, and only fall back to
    // sample data if that isn't configured or fails. On every load *after*
    // this, local storage is treated as the source of truth so that
    // deleting things (or the Sheet still holding stale rows because a
    // push hasn't gone through) can never silently bring old/sample data
    // back. Use the "Pull from Sheet" button in Settings to sync manually.
    let pulled = false;
    if(db.settings.useSheets && db.settings.gasUrl){
      pulled = await pullRemote();
    }
    if(!pulled && db.buildings.length===0 && db.units.length===0 && db.income.length===0){
      seed();
    }
    saveLocal();
  }

  renderShell();
  renderView();
  // keyboard: esc closes modal
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
}

initApp();
